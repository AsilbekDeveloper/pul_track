<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PulTrack — Tranzaksiyalar</title>
  <script>
    if ((localStorage.getItem('pt_theme') || 'light') === 'dark') document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors">
  <div class="flex min-h-screen">
    <div id="sidebar-slot"></div>
    <main class="flex-1 min-w-0">
      <header class="h-14 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex items-center justify-between px-6 transition-colors">
        <h1 class="text-base font-semibold text-slate-800 dark:text-white" data-i18n="tx_title"></h1>
        <div class="flex items-center gap-1">
          <button id="btn-export" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700" data-i18n-title="tx_export">⭳</button>
          <button id="btn-refresh" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700" data-i18n-title="common_refresh">🔄</button>
        </div>
      </header>
      <div class="p-6 max-w-6xl">
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-4 mb-5 grid grid-cols-2 md:grid-cols-6 gap-3 items-end transition-colors">
          <div class="col-span-2">
            <label class="text-xs text-slate-500 dark:text-slate-400" data-i18n="tx_search"></label>
            <input id="f-search" data-i18n-ph="tx_search_ph" class="w-full px-3 py-2 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
          </div>
          <div>
            <label class="text-xs text-slate-500 dark:text-slate-400" data-i18n="tx_type"></label>
            <select id="f-type" class="w-full px-3 py-2 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
              <option value="" data-i18n="tx_all"></option><option value="income" data-i18n="ov_income"></option><option value="expense" data-i18n="ov_expense"></option>
            </select>
          </div>
          <div>
            <label class="text-xs text-slate-500 dark:text-slate-400" data-i18n="tx_category"></label>
            <select id="f-category" class="w-full px-3 py-2 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm"><option value="" data-i18n="tx_all"></option></select>
          </div>
          <div>
            <label class="text-xs text-slate-500 dark:text-slate-400" data-i18n="tx_from"></label>
            <input id="f-start" type="date" class="w-full px-3 py-2 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
          </div>
          <div>
            <label class="text-xs text-slate-500 dark:text-slate-400" data-i18n="tx_to"></label>
            <input id="f-end" type="date" class="w-full px-3 py-2 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
          </div>
          <div class="col-span-2 md:col-span-6 flex gap-2">
            <button id="f-apply" class="px-4 py-2 rounded-lg bg-slate-900 dark:bg-emerald-600 text-white text-sm font-medium" data-i18n="tx_filter"></button>
            <button id="f-clear" class="px-4 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-sm font-medium" data-i18n="tx_clear"></button>
          </div>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden transition-colors">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 dark:bg-slate-700/50 text-slate-500 dark:text-slate-400 text-xs uppercase">
              <tr>
                <th class="text-left px-4 py-3" data-i18n="tx_col_date"></th><th class="text-left px-4 py-3" data-i18n="tx_col_type"></th>
                <th class="text-left px-4 py-3" data-i18n="tx_col_category"></th><th class="text-left px-4 py-3" data-i18n="tx_col_note"></th>
                <th class="text-right px-4 py-3" data-i18n="tx_col_amount"></th><th class="px-4 py-3"></th>
              </tr>
            </thead>
            <tbody id="rows" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" class="fixed bottom-5 right-5 hidden px-4 py-2 rounded-lg bg-slate-900 text-white text-sm shadow-lg"></div>

  <script src="i18n.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let cats = [];
    let lastTxs = [];

    function catOptions(selectedId, type) {
      return cats.filter(c => !type || c.type === type)
        .map(c => `<option value="${c.id}" ${c.id === selectedId ? "selected" : ""}>${c.name}</option>`).join("");
    }

    function viewRow(tx) {
      const tr = document.createElement("tr");
      tr.className = "hover:bg-slate-50 dark:hover:bg-slate-700/50";
      tr.innerHTML = `
        <td class="px-4 py-3 whitespace-nowrap">${tx.occurred_at.split('-').reverse().join('.')}</td>
        <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${tx.type==='income'?'bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400':'bg-rose-50 dark:bg-rose-500/10 text-rose-700 dark:text-rose-400'}">${tx.type==='income'?t("ov_income"):t("ov_expense")}</span></td>
        <td class="px-4 py-3">${tx.category || '—'}</td>
        <td class="px-4 py-3 text-slate-500 dark:text-slate-400">${tx.note || '—'}</td>
        <td class="px-4 py-3 text-right font-semibold ${tx.type==='income'?'text-emerald-600 dark:text-emerald-400':'text-rose-600 dark:text-rose-400'}">${fmtMoney(tx.amount)}</td>
        <td class="px-4 py-3 text-right whitespace-nowrap">
          <button class="text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 px-1 btn-edit">✎</button>
          <button class="text-slate-400 hover:text-rose-600 px-1 btn-del">🗑</button>
        </td>`;
      tr.querySelector(".btn-edit").onclick = () => tr.replaceWith(editRow(tx));
      tr.querySelector(".btn-del").onclick = async () => {
        if (!confirm(t("tx_confirm_delete"))) return;
        if (await apiDelete("/api/transactions/" + tx.id)) { toast(t("tx_deleted")); load(); }
      };
      return tr;
    }

    function editRow(tx) {
      const tr = document.createElement("tr");
      tr.className = "bg-slate-50 dark:bg-slate-700/50";
      tr.innerHTML = `
        <td class="px-4 py-3"><input type="date" value="${tx.occurred_at}" class="e-date px-2 py-1 border dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded text-xs"></td>
        <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${tx.type==='income'?'bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-400':'bg-rose-50 dark:bg-rose-500/10 text-rose-700 dark:text-rose-400'}">${tx.type==='income'?t("ov_income"):t("ov_expense")}</span></td>
        <td class="px-4 py-3"><select class="e-cat px-2 py-1 border dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded text-xs"><option value="">—</option>${catOptions(tx.category_id, tx.type)}</select></td>
        <td class="px-4 py-3"><input type="text" value="${tx.note || ''}" class="e-note px-2 py-1 border dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded text-xs w-full"></td>
        <td class="px-4 py-3 text-right"><input type="number" value="${tx.amount}" class="e-amount px-2 py-1 border dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded text-xs w-28 text-right"></td>
        <td class="px-4 py-3 text-right whitespace-nowrap">
          <button class="text-emerald-600 px-1 btn-save">✔</button>
          <button class="text-slate-400 px-1 btn-cancel">✕</button>
        </td>`;
      tr.querySelector(".btn-cancel").onclick = () => tr.replaceWith(viewRow(tx));
      tr.querySelector(".btn-save").onclick = async () => {
        const cid = tr.querySelector(".e-cat").value;
        const ok = await apiPatch("/api/transactions/" + tx.id, {
          amount: Number(tr.querySelector(".e-amount").value),
          occurred_at: tr.querySelector(".e-date").value,
          note: tr.querySelector(".e-note").value || null,
          category_id: cid ? Number(cid) : null,
        });
        if (ok) { toast(t("tx_saved")); load(); }
      };
      return tr;
    }

    async function load() {
      const p = new URLSearchParams();
      const s = document.getElementById("f-search").value; if (s) p.set("search", s);
      const ty = document.getElementById("f-type").value; if (ty) p.set("type", ty);
      const c = document.getElementById("f-category").value; if (c) p.set("category_id", c);
      const st = document.getElementById("f-start").value; if (st) p.set("start", st);
      const en = document.getElementById("f-end").value; if (en) p.set("end", en);
      const txs = (await apiGet("/api/transactions?" + p.toString())) || [];
      lastTxs = txs;
      const body = document.getElementById("rows");
      body.innerHTML = "";
      if (!txs.length) { body.innerHTML = `<tr><td colspan="6" class="px-4 py-10 text-center text-slate-400 dark:text-slate-500">${t("tx_not_found")}</td></tr>`; return; }
      txs.forEach(tx => body.appendChild(viewRow(tx)));
    }

    function exportCsv() {
      if (!lastTxs.length) return toast(t("tx_export_empty"));
      const header = [t("tx_col_date"), t("tx_col_type"), t("tx_col_category"), t("tx_col_note"), t("tx_col_amount")];
      const rows = lastTxs.map(tx => [
        tx.occurred_at,
        tx.type === "income" ? t("ov_income") : t("ov_expense"),
        tx.category || "",
        (tx.note || "").replace(/"/g, '""'),
        tx.amount,
      ]);
      const csv = [header, ...rows]
        .map(r => r.map(v => `"${v}"`).join(","))
        .join("\n");
      const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `pultrack-tranzaksiyalar-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    async function init() {
      cats = (await apiGet("/api/categories")) || [];
      document.getElementById("f-category").innerHTML =
        `<option value="">${t("tx_all")}</option>` + cats.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
      document.getElementById("f-apply").onclick = load;
      document.getElementById("f-clear").onclick = () => {
        ["f-search","f-type","f-category","f-start","f-end"].forEach(id => document.getElementById(id).value = "");
        load();
      };
      load();
    }

    document.getElementById("btn-refresh").onclick = () =>
      withSpin(document.getElementById("btn-refresh"), load);
    document.getElementById("btn-export").onclick = exportCsv;

    applyI18n();
    if (requireAuth()) { renderNav("transactions"); init(); }
  </script>
</body>
</html>
