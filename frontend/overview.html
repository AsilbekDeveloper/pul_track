<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PulTrack — Umumiy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="flex min-h-screen">
    <div id="sidebar-slot"></div>
    <main class="flex-1 min-w-0">
      <header class="h-14 border-b border-slate-200 bg-white flex items-center px-6">
        <h1 class="text-base font-semibold text-slate-800">Umumiy ko'rinish</h1>
      </header>
      <div class="p-6 max-w-6xl">
        <div id="alerts" class="mb-5 space-y-2"></div>
        <div id="kpis" class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <!-- Quick add -->
          <div class="bg-white rounded-xl border border-slate-200 p-5">
            <h2 class="font-semibold text-slate-800 mb-4">Tez qo'shish</h2>
            <div class="flex gap-2 mb-3">
              <button id="btn-expense" class="flex-1 py-2 rounded-lg text-sm font-medium bg-rose-600 text-white">Xarajat</button>
              <button id="btn-income" class="flex-1 py-2 rounded-lg text-sm font-medium bg-slate-100 text-slate-600">Daromad</button>
            </div>
            <input id="q-amount" type="number" placeholder="Summa (so'm)" class="w-full mb-2 px-3 py-2 border border-slate-200 rounded-lg text-sm">
            <select id="q-category" class="w-full mb-2 px-3 py-2 border border-slate-200 rounded-lg text-sm"></select>
            <input id="q-date" type="date" class="w-full mb-2 px-3 py-2 border border-slate-200 rounded-lg text-sm">
            <input id="q-note" type="text" placeholder="Izoh (ixtiyoriy)" class="w-full mb-3 px-3 py-2 border border-slate-200 rounded-lg text-sm">
            <button id="q-submit" class="w-full py-2 rounded-lg bg-slate-900 text-white text-sm font-medium">Qo'shish</button>
          </div>

          <!-- Recent -->
          <div class="bg-white rounded-xl border border-slate-200 p-5 lg:col-span-2">
            <h2 class="font-semibold text-slate-800 mb-4">So'nggi tranzaksiyalar</h2>
            <div id="recent" class="divide-y divide-slate-100"></div>
            <a href="transactions.html" class="inline-block mt-4 text-sm text-emerald-600 font-medium">Barchasini ko'rish →</a>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" class="fixed bottom-5 right-5 hidden px-4 py-2 rounded-lg bg-slate-900 text-white text-sm shadow-lg"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let qType = "expense";
    let allCats = [];

    function delta(now, prev) {
      if (prev && prev > 0) {
        const pct = ((now - prev) / prev * 100);
        const up = pct >= 0;
        return `<span class="${up ? 'text-emerald-600' : 'text-rose-600'}">${up ? '▲' : '▼'} ${Math.abs(pct).toFixed(1)}%</span>
                <span class="text-slate-400">o'tgan oyga nisbatan</span>`;
      }
      return `<span class="text-slate-400">o'tgan oy ma'lumoti yo'q</span>`;
    }

    function kpiCard(title, value, cls, sub) {
      return `<div class="bg-white rounded-xl border border-slate-200 p-5">
        <div class="text-xs text-slate-500 uppercase tracking-wide">${title}</div>
        <div class="text-2xl font-bold ${cls} mt-1">${fmtMoney(value)}</div>
        <div class="text-xs mt-2">${sub}</div></div>`;
    }

    function renderCategoryOptions() {
      const sel = document.getElementById("q-category");
      const opts = allCats.filter(c => c.type === qType)
        .map(c => `<option value="${c.id}">${c.name}</option>`).join("");
      sel.innerHTML = `<option value="">Kategoriya (ixtiyoriy)</option>` + opts;
    }

    function setType(t) {
      qType = t;
      document.getElementById("btn-expense").className =
        "flex-1 py-2 rounded-lg text-sm font-medium " + (t === "expense" ? "bg-rose-600 text-white" : "bg-slate-100 text-slate-600");
      document.getElementById("btn-income").className =
        "flex-1 py-2 rounded-lg text-sm font-medium " + (t === "income" ? "bg-emerald-600 text-white" : "bg-slate-100 text-slate-600");
      renderCategoryOptions();
    }

    async function load() {
      document.getElementById("q-date").value = new Date().toISOString().slice(0, 10);
      allCats = (await apiGet("/api/categories")) || [];
      renderCategoryOptions();

      const ov = await apiGet("/api/overview");
      if (!ov) return;
      const tm = ov.totals.this_month, lm = ov.totals.last_month;

      document.getElementById("kpis").innerHTML =
        kpiCard("Bu oy · Daromad", tm.income, "text-emerald-600", delta(tm.income, lm.income)) +
        kpiCard("Bu oy · Xarajat", tm.expense, "text-rose-600", delta(tm.expense, lm.expense)) +
        kpiCard("Bu oy · Sof foyda", tm.net, tm.net >= 0 ? "text-slate-900" : "text-rose-600", delta(tm.net, lm.net));

      document.getElementById("alerts").innerHTML = (ov.alerts || []).map(a => `
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl border ${a.over ? 'border-rose-200 bg-rose-50 text-rose-700' : 'border-amber-200 bg-amber-50 text-amber-700'}">
          <span>⚠️</span><span class="text-sm font-medium">«${a.category}» byudjeti: ${fmtMoney(a.spent)} / ${fmtMoney(a.limit)} (${a.pct}%)
          ${a.over ? '— limitdan oshdi!' : '— limitga yaqinlashyapti'}</span></div>`).join("");

      document.getElementById("recent").innerHTML = (ov.recent || []).map(t => `
        <div class="flex items-center justify-between py-3">
          <div>
            <div class="text-sm font-medium text-slate-800">${t.category || 'Kategoriyasiz'}</div>
            <div class="text-xs text-slate-400">${t.occurred_at.split('-').reverse().join('.')}${t.note ? ' · ' + t.note : ''}</div>
          </div>
          <div class="text-sm font-semibold ${t.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}">
            ${t.type === 'income' ? '+' : '−'}${fmtMoney(t.amount)}</div>
        </div>`).join("") || '<div class="text-sm text-slate-400 py-4">Hali tranzaksiya yo\'q</div>';
    }

    document.getElementById("btn-expense").onclick = () => setType("expense");
    document.getElementById("btn-income").onclick = () => setType("income");
    document.getElementById("q-submit").onclick = async () => {
      const amount = Number(document.getElementById("q-amount").value);
      if (!amount || amount <= 0) return toast("Summani kiriting");
      const cid = document.getElementById("q-category").value;
      const ok = await apiPost("/api/transactions", {
        type: qType, amount,
        category_id: cid ? Number(cid) : null,
        occurred_at: document.getElementById("q-date").value,
        note: document.getElementById("q-note").value || null,
      });
      if (ok) { toast("Qo'shildi ✅"); setTimeout(load, 300);
        document.getElementById("q-amount").value = ""; document.getElementById("q-note").value = ""; }
    };

    if (requireAuth()) { renderNav("overview"); setType("expense"); load(); }
  </script>
</body>
</html>
