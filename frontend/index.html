<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PulTrack — Kirish</title>
  <script>
    // Apply saved theme before paint to avoid a light->dark flash.
    if ((localStorage.getItem('pt_theme') || 'light') === 'dark') document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 transition-colors">
  <button class="btn-theme-toggle fixed top-4 right-4 w-9 h-9 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800" title="Dark/Light">🌙</button>
  <div class="fixed top-4 left-4 flex gap-1">
    <button data-lang="uz" class="px-2 py-1 rounded text-xs font-semibold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300">UZ</button>
    <button data-lang="ru" class="px-2 py-1 rounded text-xs font-semibold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300">RU</button>
    <button data-lang="en" class="px-2 py-1 rounded text-xs font-semibold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300">EN</button>
  </div>

  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <div class="text-3xl font-bold text-slate-900 dark:text-white">Pul<span class="text-emerald-600 dark:text-emerald-400">Track</span></div>
      <div class="text-sm text-slate-500 dark:text-slate-400 mt-1" data-i18n="app_tagline"></div>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-8 text-center transition-colors">
      <div class="text-4xl mb-3">💼</div>
      <h1 class="text-lg font-semibold text-slate-900 dark:text-white" data-i18n="login_title"></h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 mb-6" data-i18n="login_sub"></p>

      <!-- Telegram Login Widget mounts here -->
      <div id="tg-login" class="flex justify-center"></div>

      <!-- Dev login (localhost only) -->
      <div id="dev-login" class="hidden mt-6 pt-6 border-t border-slate-100 dark:border-slate-700">
        <div class="text-xs text-slate-400 dark:text-slate-500 mb-2" data-i18n="login_dev_label"></div>
        <div class="flex gap-2">
          <input id="dev-id" type="number" value="1" class="w-24 px-3 py-2 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm" placeholder="TG id">
          <button onclick="devLogin()" class="flex-1 py-2 rounded-lg bg-slate-900 dark:bg-emerald-600 text-white text-sm font-medium" data-i18n="login_dev_button"></button>
        </div>
        <div class="text-xs text-slate-400 dark:text-slate-500 mt-2" data-i18n="login_dev_hint"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-5 right-5 hidden px-4 py-2 rounded-lg bg-slate-900 text-white text-sm shadow-lg"></div>

  <script src="i18n.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    applyI18n();
    document.querySelectorAll("[data-lang]").forEach(btn => { btn.onclick = () => setLang(btn.dataset.lang); });
    document.querySelectorAll(".btn-theme-toggle").forEach(btn => {
      btn.textContent = getTheme() === "dark" ? "☀️" : "🌙";
      btn.onclick = toggleTheme;
    });

    // Bot-issued login link (?bot_token=...) — sent by the bot's /login
    // command. Bypasses the Telegram Login Widget entirely; the token is
    // already a valid signed JWT from our backend, so we use it directly.
    (function loginFromBotLink() {
      const p = new URLSearchParams(location.search);
      const botToken = p.get("bot_token");
      if (botToken) {
        setToken(botToken);
        location.href = "overview.html";
      }
    })();

    // If already logged in, go straight to the dashboard.
    if (getToken()) location.href = "overview.html";

    // Telegram Login Widget — called by Telegram after auth.
    window.onTelegramAuth = async (user) => {
      const data = await apiPost("/api/auth/telegram", user);
      if (data && data.access_token) { setToken(data.access_token); location.href = "overview.html"; }
    };

    // Mount the widget (needs a real bot username + domain set via BotFather).
    (function mountWidget() {
      const uname = window.PULTRACK_BOT_USERNAME;
      if (uname && uname !== "your_bot_username") {
        const s = document.createElement("script");
        s.async = true;
        s.src = "https://telegram.org/js/telegram-widget.js?22";
        s.setAttribute("data-telegram-login", uname);
        s.setAttribute("data-size", "large");
        s.setAttribute("data-radius", "10");
        s.setAttribute("data-onauth", "onTelegramAuth(user)");
        s.setAttribute("data-request-access", "write");
        document.getElementById("tg-login").appendChild(s);
      } else {
        document.getElementById("tg-login").innerHTML =
          `<div class="text-xs text-amber-600">${t("login_bot_missing")}</div>`;
      }
    })();

    // Show dev-login only on localhost.
    if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
      document.getElementById("dev-login").classList.remove("hidden");
    }

    async function devLogin() {
      const id = Number(document.getElementById("dev-id").value || 1);
      const data = await apiPost("/api/auth/dev-login", { telegram_user_id: id, name: "Demo Biznes" });
      if (data && data.access_token) { setToken(data.access_token); location.href = "overview.html"; }
    }
    window.devLogin = devLogin;

    // Temporary: ?demo_key=...&tg_id=...[&name=...] logs in via the secret
    // demo-login endpoint, for testing the deployed dashboard before the
    // Telegram Login Widget flow is confirmed end-to-end. Remove once done.
    (async function demoLoginFromUrl() {
      const p = new URLSearchParams(location.search);
      const demoKey = p.get("demo_key");
      const tgId = p.get("tg_id");
      if (!demoKey || !tgId) return;
      const res = await fetch(API + "/api/auth/demo-login", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Demo-Key": demoKey },
        body: JSON.stringify({ telegram_user_id: Number(tgId), name: p.get("name") || null }),
      });
      if (res.ok) {
        const data = await res.json();
        setToken(data.access_token);
        location.href = "overview.html";
      } else {
        toast("Demo login xato: " + res.status);
      }
    })();
  </script>
</body>
</html>
