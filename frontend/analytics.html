<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PulTrack — Analitika</title>
  <script>
    if ((localStorage.getItem('pt_theme') || 'light') === 'dark') document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors">
  <div class="flex min-h-screen">
    <div id="sidebar-slot"></div>
    <main class="flex-1 min-w-0">
      <header class="h-14 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex items-center justify-between px-6 transition-colors">
        <h1 class="text-base font-semibold text-slate-800 dark:text-white" data-i18n="an_title"></h1>
        <button id="btn-refresh" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700" data-i18n-title="common_refresh">🔄</button>
      </header>
      <div class="p-6 max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 lg:col-span-2 transition-colors">
            <h2 class="font-semibold text-slate-800 dark:text-white mb-4" data-i18n="an_trend"></h2>
            <canvas id="trendChart" height="90"></canvas>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 transition-colors">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-semibold text-slate-800 dark:text-white" data-i18n="an_by_category"></h2>
              <div class="flex gap-2">
                <select id="catType" class="px-2 py-1 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
                  <option value="expense" data-i18n="ov_expense"></option><option value="income" data-i18n="ov_income"></option>
                </select>
                <select id="catPeriod" class="px-2 py-1 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
                  <option value="this_month" data-i18n="an_this_month"></option><option value="last_month" data-i18n="an_last_month"></option>
                  <option value="this_year" data-i18n="an_this_year"></option><option value="all" data-i18n="an_all"></option>
                </select>
              </div>
            </div>
            <canvas id="catChart" height="220"></canvas>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 transition-colors">
            <h2 class="font-semibold text-slate-800 dark:text-white mb-4" data-i18n="an_dist_table"></h2>
            <div id="catTable" class="divide-y divide-slate-100 dark:divide-slate-700 text-sm"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" class="fixed bottom-5 right-5 hidden px-4 py-2 rounded-lg bg-slate-900 text-white text-sm shadow-lg"></div>

  <script src="i18n.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    const PALETTE = ['#059669','#e11d48','#2563eb','#d97706','#7c3aed','#0891b2','#65a30d','#db2777','#475569','#ca8a04'];
    let trendChart, catChart;

    // Match Chart.js text/grid colors to the current theme.
    const isDark = getTheme() === "dark";
    Chart.defaults.color = isDark ? "#cbd5e1" : "#475569";
    Chart.defaults.borderColor = isDark ? "#334155" : "#e2e8f0";

    async function loadTrend() {
      const data = (await apiGet("/api/analytics/trend?months=6")) || [];
      trendChart && trendChart.destroy();
      trendChart = new Chart(document.getElementById("trendChart"), {
        type: "bar",
        data: { labels: data.map(d => d.month), datasets: [
          { label: t("ov_income"), data: data.map(d => d.income), backgroundColor: "#059669", borderRadius: 4 },
          { label: t("ov_expense"), data: data.map(d => d.expense), backgroundColor: "#e11d48", borderRadius: 4 },
        ]},
        options: { responsive: true, plugins: { legend: { position: "bottom" } },
          scales: { y: { ticks: { callback: v => (v / 1e6) + "M" } } } }
      });
    }

    async function loadCategory() {
      const type = document.getElementById("catType").value;
      const period = document.getElementById("catPeriod").value;
      const data = (await apiGet(`/api/analytics/by-category?type=${type}&period=${period}`)) || [];
      const values = data.map(d => d.total);
      catChart && catChart.destroy();
      catChart = new Chart(document.getElementById("catChart"), {
        type: "doughnut",
        data: { labels: data.map(d => d.name), datasets: [{ data: values, backgroundColor: PALETTE }] },
        options: { responsive: true, plugins: { legend: { position: "bottom" } } }
      });
      const total = values.reduce((a, b) => a + b, 0) || 1;
      document.getElementById("catTable").innerHTML = data.length
        ? data.map((d, i) => `<div class="flex items-center justify-between py-2">
            <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full" style="background:${PALETTE[i % PALETTE.length]}"></span>${d.name}</span>
            <span class="text-slate-600 dark:text-slate-300">${fmtMoney(d.total)} <span class="text-slate-400 dark:text-slate-500">(${Math.round(d.total / total * 100)}%)</span></span></div>`).join("")
        : `<div class="py-8 text-center text-slate-400 dark:text-slate-500">${t("an_no_data")}</div>`;
    }

    document.getElementById("catType").onchange = loadCategory;
    document.getElementById("catPeriod").onchange = loadCategory;
    document.getElementById("btn-refresh").onclick = () =>
      withSpin(document.getElementById("btn-refresh"), () => Promise.all([loadTrend(), loadCategory()]));

    applyI18n();
    if (requireAuth()) { renderNav("analytics"); loadTrend(); loadCategory(); }
  </script>
</body>
</html>
