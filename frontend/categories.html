<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PulTrack — Kategoriyalar</title>
  <script>
    if ((localStorage.getItem('pt_theme') || 'light') === 'dark') document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors">
  <div class="flex min-h-screen">
    <div id="sidebar-slot"></div>
    <main class="flex-1 min-w-0">
      <header class="h-14 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex items-center justify-between px-4 md:px-6 transition-colors">
        <h1 class="text-base font-semibold text-slate-800 dark:text-white" data-i18n="cat_title"></h1>
        <button id="btn-refresh" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700" data-i18n-title="common_refresh">🔄</button>
      </header>
      <div class="p-4 md:p-6 max-w-6xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 transition-colors">
            <h2 class="font-semibold text-emerald-700 dark:text-emerald-400 mb-4" data-i18n="cat_income"></h2>
            <div class="flex gap-2 mb-4">
              <input id="new-income" type="text" data-i18n-ph="cat_new_ph" class="flex-1 px-3 py-2 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
              <button data-add="income" class="px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium">+</button>
            </div>
            <div id="list-income" class="space-y-1"></div>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 transition-colors">
            <h2 class="font-semibold text-rose-700 dark:text-rose-400 mb-4" data-i18n="cat_expense"></h2>
            <div class="flex gap-2 mb-4">
              <input id="new-expense" type="text" data-i18n-ph="cat_new_ph" class="flex-1 px-3 py-2 border border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
              <button data-add="expense" class="px-4 py-2 rounded-lg bg-rose-600 text-white text-sm font-medium">+</button>
            </div>
            <div id="list-expense" class="space-y-1"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast" class="fixed bottom-5 right-5 hidden px-4 py-2 rounded-lg bg-slate-900 text-white text-sm shadow-lg"></div>

  <script src="i18n.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    function row(c) {
      return `<div class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/50">
        <span class="text-sm">${c.name}${c.is_custom ? '' : `<span class="ml-2 text-xs text-slate-400 dark:text-slate-500">${t("cat_standard")}</span>`}</span>
        <button class="text-slate-400 hover:text-rose-600 text-sm" data-del="${c.id}">🗑</button></div>`;
    }

    async function load() {
      const cats = (await apiGet("/api/categories")) || [];
      const inc = cats.filter(c => c.type === "income");
      const exp = cats.filter(c => c.type === "expense");
      const empty = `<div class="text-sm text-slate-400 dark:text-slate-500 py-4 text-center">${t("cat_empty")}</div>`;
      document.getElementById("list-income").innerHTML = inc.map(row).join("") || empty;
      document.getElementById("list-expense").innerHTML = exp.map(row).join("") || empty;
      document.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
        if (!confirm(t("tx_confirm_delete"))) return;
        if (await apiDelete("/api/categories/" + b.dataset.del)) { toast(t("cat_deleted")); load(); }
      });
    }

    document.querySelectorAll("[data-add]").forEach(b => b.onclick = async () => {
      const type = b.dataset.add;
      const input = document.getElementById("new-" + type);
      const name = input.value.trim();
      if (!name) return toast(t("cat_name_required"));
      if (await apiPost("/api/categories", { name, type })) { input.value = ""; toast(t("cat_added")); load(); }
    });

    document.getElementById("btn-refresh").onclick = () =>
      withSpin(document.getElementById("btn-refresh"), load);

    applyI18n();
    if (requireAuth()) { renderNav("categories"); load(); }
  </script>
</body>
</html>
