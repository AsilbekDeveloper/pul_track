services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pultrack
      POSTGRES_PASSWORD: pultrack
      POSTGRES_DB: pultrack
    ports:
      # Host 55432 -> avoids native PostgreSQL clusters already on 5432 & 5433.
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pultrack"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
